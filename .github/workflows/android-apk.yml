name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-apk.yml"
      - "android/**"
      - "assets/**"
      - "index.html"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Bundle web game into Android assets
        run: |
          rm -rf android/app/src/main/assets/public
          mkdir -p android/app/src/main/assets/public
          cp -R index.html src assets android/app/src/main/assets/public/

      - name: Download Gradle
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.9-bin.zip -o gradle.zip
          unzip -q gradle.zip

      - name: Build APK
        run: ./gradle-8.9/bin/gradle -p android assembleDebug --no-daemon

      - name: Publish APK file into GitHub Pages
        run: |
          mkdir -p downloads
          cp android/app/build/outputs/apk/debug/app-debug.apk downloads/mila-selena-coloring-world.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/mila-selena-coloring-world.apk
          if git diff --cached --quiet; then
            echo "APK did not change."
          else
            git commit -m "Build Android APK [skip ci]"
            git push
          fi
